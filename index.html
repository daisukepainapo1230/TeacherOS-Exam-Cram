  <title>TeacherOS Exam Cram</title>
  <style>
    :root {
      --navy: #17324d;
      --blue: #176b87;
      --blue-2: #2384a5;
      --blue-soft: #eaf6fa;
      --green: #2f856f;
      --green-soft: #eaf7f1;
      --orange: #ec7b35;
      --orange-dark: #ce5e1c;
      --orange-soft: #fff2e8;
      --red: #c44f54;
      --red-soft: #fff0f0;
      --ink: #1d2b36;
      --muted: #687783;
      --line: #dce5e9;
      --paper: #ffffff;
      --canvas: #f3f7f8;
      --shadow: 0 12px 35px rgba(27, 62, 78, .08);
      --radius: 20px;
      --radius-sm: 13px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --mobile-nav-height: 72px;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: var(--canvas);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      scroll-padding-bottom: calc(var(--mobile-nav-height) + var(--safe-bottom) + 18px);
      color-scheme: light;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      padding-bottom: calc(var(--mobile-nav-height) + var(--safe-bottom));
      background:
        radial-gradient(circle at 10% -10%, rgba(35, 132, 165, .09), transparent 30rem),
        linear-gradient(180deg, #f8fbfc 0%, var(--canvas) 100%);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }

    button, select, textarea {
      font: inherit;
      touch-action: manipulation;
    }

    button {
      min-height: 44px;
      color: inherit;
      -webkit-user-select: none;
      user-select: none;
    }

    select, textarea { font-size: 16px; }

    button:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(35, 132, 165, .27);
      outline-offset: 3px;
    }

    .skip-link {
      position: fixed;
      left: 12px;
      top: -70px;
      z-index: 100;
      padding: 12px 16px;
      border-radius: 10px;
      color: #fff;
      background: var(--navy);
      text-decoration: none;
    }

    .skip-link:focus { top: 12px; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(205, 220, 226, .86);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      padding-top: var(--safe-top);
    }

    .header-inner {
      width: min(1120px, calc(100% - 40px - var(--safe-left) - var(--safe-right)));
      min-height: 72px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      min-height: 44px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    .brand-mark {
      width: 41px;
      height: 41px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(145deg, var(--blue-2), var(--green));
      box-shadow: 0 6px 18px rgba(23, 107, 135, .18);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .brand-copy { min-width: 0; }
    .brand-name {
      display: block;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.02em;
      white-space: nowrap;
    }
    .brand-sub {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      white-space: nowrap;
    }

    .header-spacer { flex: 1; }

    .today-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 7px 12px;
      border: 1px solid #dbe8ec;
      border-radius: 999px;
      color: var(--blue);
      background: #f8fcfd;
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .today-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(47, 133, 111, .11);
    }

    .home-button {
      width: 44px;
      height: 44px;
      display: none;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    .home-button.is-visible { display: grid; }

    .app-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 35;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 3px;
      min-height: calc(var(--mobile-nav-height) + var(--safe-bottom));
      padding: 6px max(7px, var(--safe-right)) max(6px, var(--safe-bottom)) max(7px, var(--safe-left));
      border-top: 1px solid rgba(205, 220, 226, .9);
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 -8px 26px rgba(27, 62, 78, .07);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      transition: transform .2s ease;
    }

    .nav-heading { display: none; }

    .nav-item {
      min-width: 0;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: 0;
      border-radius: 13px;
      padding: 5px 3px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-weight: 750;
    }

    .nav-symbol {
      width: 27px;
      height: 25px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 850;
      line-height: 1;
    }

    .nav-label {
      overflow: hidden;
      max-width: 100%;
      font-size: 10px;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-item.is-active {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .nav-item.is-active .nav-symbol { color: var(--blue); }

    .shell {
      width: min(1120px, calc(100% - 40px - var(--safe-left) - var(--safe-right)));
      margin: 0 auto;
      padding: 46px 0 calc(26px + var(--safe-bottom));
    }

    .shell:focus { outline: none; }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.35fr .65fr;
      gap: 28px;
      align-items: center;
      min-height: 265px;
      padding: 43px 48px;
      border: 1px solid #dce9ed;
      border-radius: 28px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 310px;
      height: 310px;
      right: -110px;
      top: -125px;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(35, 132, 165, .12), rgba(47, 133, 111, .08));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 22px;
      height: 2px;
      border-radius: 2px;
      background: var(--orange);
    }

    h1, h2, h3, p { margin-top: 0; }

    .hero h1 {
      max-width: 680px;
      margin-bottom: 15px;
      color: var(--navy);
      font-size: clamp(30px, 4.3vw, 51px);
      line-height: 1.13;
      letter-spacing: -.045em;
    }

    .hero h1 span { color: var(--blue); }

    .hero-lead {
      max-width: 650px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.85;
    }

    .install-hint {
      display: flex;
      align-items: center;
      gap: 9px;
      width: fit-content;
      margin: 16px 0 0;
      padding: 9px 12px;
      border: 1px solid #cfe0e6;
      border-radius: 12px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.55;
    }

    .install-hint span {
      width: 23px;
      height: 23px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: #fff;
      background: var(--blue);
      font-size: 16px;
    }

    .hero-meter {
      position: relative;
      z-index: 1;
      padding: 25px;
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 21px;
      background: linear-gradient(150deg, var(--blue), #247b87 62%, var(--green));
      color: #fff;
      box-shadow: 0 16px 34px rgba(23, 107, 135, .2);
    }

    .hero-meter-label {
      color: rgba(255,255,255,.78);
      font-size: 12px;
      font-weight: 700;
    }

    .hero-meter-value {
      margin: 7px 0 17px;
      font-size: 34px;
      font-weight: 850;
      letter-spacing: -.04em;
    }

    .hero-meter-value small {
      margin-left: 4px;
      font-size: 14px;
      font-weight: 650;
    }

    .meter-track {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.2);
    }

    .meter-track span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: #fff;
    }

    .meter-note {
      margin: 12px 0 0;
      color: rgba(255,255,255,.83);
      font-size: 12px;
      line-height: 1.5;
    }

    .section-heading {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin: 42px 0 18px;
    }

    .section-heading h2 {
      margin-bottom: 5px;
      color: var(--navy);
      font-size: 23px;
      letter-spacing: -.025em;
    }

    .section-heading p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .mode-card {
      min-height: 190px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 19px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 25px;
      background: var(--paper);
      text-align: left;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(27, 62, 78, .035);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .mode-card:hover {
      transform: translateY(-3px);
      border-color: #b9d5de;
      box-shadow: var(--shadow);
    }

    .mode-card:active { transform: translateY(-1px); }

    .mode-icon {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 21px;
      font-weight: 850;
    }

    .mode-card.weak .mode-icon { color: var(--orange-dark); background: var(--orange-soft); }
    .mode-card.essay .mode-icon { color: var(--green); background: var(--green-soft); }
    .mode-card.records .mode-icon { color: #6372a0; background: #f0f1f8; }

    .mode-title {
      display: block;
      margin: 2px 0 8px;
      color: var(--navy);
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -.02em;

    .mode-description {

      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.75;
    }

    .mode-meta {
      grid-column: 2 / 4;
      display: inline-flex;
      width: fit-content;
      align-items: center;
      min-height: 27px;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--blue);
      background: #f1f8fa;
      font-size: 12px;
      font-weight: 750;
    }

    .chevron {
      align-self: center;
      color: #9babb3;
      font-size: 24px;
      line-height: 1;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      gap: 17px;
      margin-bottom: 28px;
    }

    .back-button {
      width: 45px;
      height: 45px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(27,62,78,.04);
      font-size: 20px;
    }

    .page-head h1 {
      margin: 0 0 5px;
      color: var(--navy);
      font-size: clamp(27px, 4vw, 38px);
      line-height: 1.2;
      letter-spacing: -.035em;
    }

    .page-head p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .subject-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 15px;
    }

    .subject-actions,
    .csv-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .subject-actions .btn,
    .csv-actions .btn {
      width: 100%;
    }

    .subject-card {
      min-height: 166px;
      border: 1px solid var(--line);
      border-radius: 17px;
      padding: 21px;
      background: #fff;
      cursor: pointer;
      text-align: left;
      transition: transform .17s ease, border-color .17s ease, box-shadow .17s ease;
    }

    .subject-card:hover {
      transform: translateY(-2px);
      border-color: #b9d5de;
      box-shadow: 0 10px 26px rgba(27, 62, 78, .07);
    }

    .subject-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .subject-symbol {
      width: 41px;
      height: 41px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: var(--blue);
      background: var(--blue-soft);
      font-weight: 850;
    }

    .subject-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .subject-name {
      display: block;
      margin-bottom: 12px;
      color: var(--navy);
      font-size: 18px;
      font-weight: 800;
    }

    .thin-track {
      display: block;
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf2f4;
    }

    .thin-track span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue-2), var(--green));
    }

    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      padding: 15px 18px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #fff;
    }

    .filter-bar label {
      color: var(--navy);
      font-size: 13px;
      font-weight: 750;
    }

    select {
      min-width: 170px;
      min-height: 44px;
      border: 1px solid #ccdbe1;
      border-radius: 11px;
      padding: 0 36px 0 13px;
      color: var(--ink);
      background: #fff;
    }

    .quiz-layout {
      max-width: 800px;
      margin: 0 auto;
    }

    .quiz-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 13px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .quiz-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .quiz-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 17px 23px;
      border-bottom: 1px solid #e7eef1;
      background: #f9fcfd;
    }

    .subject-badge,
    .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 29px;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 12px;
      font-weight: 800;
    }

    .status-badge.unsure { color: #aa5d21; background: var(--orange-soft); }
    .status-badge.missed { color: var(--red); background: var(--red-soft); }
    .status-badge.got { color: var(--green); background: var(--green-soft); }
    .status-badge.correct { color: var(--green); background: var(--green-soft); }
    .status-badge.incorrect { color: var(--red); background: var(--red-soft); }
    .status-badge.review { color: #aa5d21; background: var(--orange-soft); }

    .question-area { padding: clamp(26px, 5vw, 46px); }

    .question-label {
      margin-bottom: 12px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .09em;
    }

    .question-text {
      margin-bottom: 0;
      color: var(--navy);
      font-size: clamp(20px, 3.2vw, 27px);
      font-weight: 750;
      line-height: 1.65;
      letter-spacing: -.015em;
    }

    .choice-list {
      display: grid;
      gap: 12px;
      margin-top: 25px;
    }

    .choice-button {
      width: 100%;
      min-height: 58px;
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 12px;
      border: 1px solid #d8e5e9;
      border-radius: 16px;
      padding: 13px 15px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
      text-align: left;
      font-size: 16px;
      font-weight: 750;
      line-height: 1.55;
      box-shadow: 0 4px 14px rgba(27, 62, 78, .04);
      transition: transform .15s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }

    .choice-button:hover {
      transform: translateY(-1px);
      border-color: #b7d8e1;
      box-shadow: 0 9px 22px rgba(27, 62, 78, .07);
    }

    .choice-button:disabled {
      cursor: default;
      transform: none;
      opacity: 1;
    }

    .choice-marker {
      width: 31px;
      height: 31px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 13px;
      font-weight: 900;
    }

    .choice-button.is-selected {
      border-color: var(--blue-2);
      background: #f0f9fc;
    }

    .choice-button.is-correct {
      border-color: #8fd2bc;
      background: var(--green-soft);
    }

    .choice-button.is-correct .choice-marker {
      color: #fff;
      background: var(--green);
    }

    .choice-button.is-wrong {
      border-color: #edb8ba;
      background: var(--red-soft);
    }

    .choice-button.is-wrong .choice-marker {
      color: #fff;
      background: var(--red);
    }

    .feedback-panel {
      margin-top: 24px;
      padding: 18px 19px;
      border-radius: 16px;
      animation: reveal .2s ease-out;
    }

    .feedback-panel.is-correct {
      border: 1px solid #bfe0d4;
      background: var(--green-soft);
    }

    .feedback-panel.is-incorrect {
      border: 1px solid #efc5c6;
      background: var(--red-soft);
    }

    .feedback-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 9px;
      color: var(--navy);
      font-size: 16px;
      font-weight: 900;
    }

    .feedback-answer {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.6;
    }

    .answer-panel {
      margin-top: 29px;
      padding: 23px;
      border-left: 4px solid var(--green);
      border-radius: 0 14px 14px 0;
      background: var(--green-soft);
      animation: reveal .2s ease-out;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .answer-panel h3 {
      margin-bottom: 7px;
      color: #246b5a;
      font-size: 14px;
    }

    .answer-text {
      margin-bottom: 13px;
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.6;
    }

    .explanation {
      margin: 0;
      padding-top: 13px;
      border-top: 1px solid rgba(47, 133, 111, .18);
      color: #4e6e66;
      font-size: 14px;
      line-height: 1.8;
    }

    .quiz-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 18px 23px 23px;
      border-top: 1px solid #e7eef1;
    }

    .btn {
      min-height: 50px;
      border: 1px solid transparent;
      border-radius: 13px;
      padding: 11px 18px;
      cursor: pointer;
      font-weight: 800;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      color: #fff;
      background: var(--orange);
      box-shadow: 0 8px 19px rgba(236, 123, 53, .2);
    }
    .btn-primary:hover { background: var(--orange-dark); }
    .btn-blue { color: #fff; background: var(--blue); }
    .btn-blue:hover { background: #105b74; }
    .btn-secondary {
      color: var(--navy);
      border-color: var(--line);
      background: #fff;
    }
    .btn-got { color: #246b5a; border-color: #bddfd3; background: var(--green-soft); }
    .btn-unsure { color: #a25a20; border-color: #f1d0b6; background: var(--orange-soft); }
    .btn-missed { color: #a84247; border-color: #efc5c6; background: var(--red-soft); }
    .btn-wide { grid-column: 1 / -1; }

    .grading-hint {
      grid-column: 1 / -1;
      margin: 0 0 2px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .result-banner {
      grid-column: 1 / -1;
      padding: 12px 15px;
      border-radius: 12px;
      color: var(--navy);
      background: #f4f8f9;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .empty-state,
    .completion-card {
      max-width: 710px;
      margin: 45px auto 0;
      padding: 48px 30px;
      border: 1px solid var(--line);
      border-radius: 23px;
      background: #fff;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .empty-icon {
      width: 67px;
      height: 67px;
      display: grid;
      place-items: center;
      margin: 0 auto 20px;
      border-radius: 20px;
      color: var(--green);
      background: var(--green-soft);
      font-size: 27px;
      font-weight: 850;
    }

    .empty-state h2,
    .completion-card h2 {
      margin-bottom: 10px;
      color: var(--navy);
      font-size: 24px;
    }

    .empty-state p,
    .completion-card p {
      max-width: 500px;
      margin: 0 auto 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .essay-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 21px;
      align-items: start;
    }

    .essay-main,
    .essay-guide,
    .record-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 5px 20px rgba(27, 62, 78, .04);
    }

    .essay-topic {
      padding: 28px;
      border-bottom: 1px solid #e3ecef;
      background: linear-gradient(135deg, #f3fafb, #f4fbf8);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .essay-topic-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 15px;
    }

    .essay-topic h2 {
      margin-bottom: 9px;
      color: var(--navy);
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.45;
      letter-spacing: -.025em;
    }

    .essay-topic p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
    }

    .text-button {
      flex: 0 0 auto;
      min-height: 44px;
      border: 1px solid #cbdde3;
      border-radius: 11px;
      padding: 8px 13px;
      color: var(--blue);
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }

    .essay-fields {
      display: grid;
      gap: 23px;
      padding: 28px;
    }

    .topic-select {
      width: 100%;
      margin-top: 16px;
      background-color: #fff;
      font-weight: 800;
    }

    .template-section {
      display: grid;
      gap: 12px;
    }

    .template-section h3 {
      margin: 0;
      color: var(--navy);
      font-size: 17px;
      line-height: 1.45;
    }

    .template-section p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .option-chips {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .essay-chip {
      min-height: 56px;
      border: 1px solid #d8e5e9;
      border-radius: 15px;
      padding: 12px 14px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.55;
      box-shadow: 0 4px 12px rgba(27, 62, 78, .035);
    }

    .essay-chip.is-selected {
      border-color: #9dd5c3;
      color: #246b5a;
      background: var(--green-soft);
      box-shadow: inset 0 0 0 1px rgba(47, 133, 111, .1);
    }

    .memo-card {
      padding: 22px;
      border: 1px solid #cfe2e7;
      border-radius: 18px;
      background: linear-gradient(180deg, #fbfefe, #f4fafb);
    }

    .memo-card h3 {
      margin: 0 0 13px;
      color: var(--navy);
      font-size: 18px;
    }

    .memo-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .memo-list li {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.75;
    }

    .memo-list strong {
      color: var(--navy);
      font-weight: 900;
    }

    .memo-num {
      width: 29px;
      height: 29px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: #fff;
      background: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }

    .field label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 9px;
      color: var(--navy);
      font-size: 14px;
      font-weight: 800;
    }

    .field-number { color: var(--blue); margin-right: 7px; }
    .char-count { color: var(--muted); font-size: 11px; font-weight: 650; }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid #ccdbe1;
      border-radius: 13px;
      padding: 15px 16px;
      color: var(--ink);
      background: #fcfefe;
      font-size: 16px;
      line-height: 1.75;
      transition: border-color .15s ease, background .15s ease;
    }

    textarea:focus {
      border-color: var(--blue-2);
      background: #fff;
    }

    textarea::placeholder { color: #9baab2; }

    .essay-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 2px;
    }

    .save-status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--green);
      font-size: 12px;
      font-weight: 750;
    }

    .essay-guide {
      position: sticky;
      top: calc(92px + var(--safe-top));
      overflow: hidden;
    }

    .guide-head {
      padding: 20px 21px;
      color: #fff;
      background: linear-gradient(145deg, var(--blue), var(--green));
    }

    .guide-head p {
      margin: 0 0 4px;
      color: rgba(255,255,255,.76);
      font-size: 11px;
      font-weight: 750;
      letter-spacing: .09em;
    }

    .guide-head h2 { margin: 0; font-size: 20px; }

    .guide-steps {
      list-style: none;
      margin: 0;
      padding: 7px 21px 16px;
    }

    .guide-steps li {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 10px;
      padding: 15px 0;
      border-bottom: 1px solid #e6edef;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.55;
    }

    .guide-steps li:last-child { border-bottom: 0; }

    .step-num {
      width: 27px;
      height: 27px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 12px;
      font-weight: 850;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 21px;
    }

    .stat-card {
      min-height: 142px;
      padding: 21px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: #fff;
    }

    .stat-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      border-radius: 10px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 14px;
      font-weight: 850;
    }

    .stat-value {
      color: var(--navy);
      font-size: 29px;
      font-weight: 850;
      letter-spacing: -.035em;
    }

    .stat-value small {
      margin-left: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stat-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .record-card { padding: 26px; }

    .csv-panel {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #f8fcfd;
    }

    .csv-panel.is-visible { display: block; }

    .csv-panel label {
      display: block;
      margin-bottom: 8px;
      color: var(--navy);
      font-size: 13px;
      font-weight: 800;
    }

    .csv-panel textarea {
      width: 100%;
      min-height: 210px;
      resize: vertical;
      border: 1px solid #ccdbe1;
      border-radius: 13px;
      padding: 13px;
      color: var(--ink);
      background: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.55;
    }

    .record-card-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 22px;
    }

    .record-card-head h2 {
      margin-bottom: 4px;
      color: var(--navy);
      font-size: 20px;
    }

    .record-card-head p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .record-list { display: grid; gap: 17px; }

    .record-row {
      display: grid;
      grid-template-columns: 92px 1fr 130px;
      gap: 15px;
      align-items: center;
    }

    .record-subject {
      color: var(--navy);
      font-size: 13px;
      font-weight: 800;
    }

    .record-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf2f4;
    }

    .record-track span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue-2), var(--green));
    }

    .record-numbers {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: right;
    }

    .record-numbers strong { color: var(--green); }

    .record-note {
      margin: 21px 0 0;
      padding: 13px 15px;
      border-radius: 11px;
      color: #587079;
      background: #f5f9fa;
      font-size: 12px;
      line-height: 1.65;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--mobile-nav-height) + var(--safe-bottom) + 16px);
      z-index: 50;
      transform: translate(-50%, 15px);

          stance: "担任一人で抱え込まず、学校全体の専門性をつないで児童を支える。",

      essayTopics.forEach(function (topic) {
        var template = essayTemplates[topic.id] || {};
        topic.keywords = template.keywords || [];
        topic.practices = template.practices || [];
        topic.stance = template.stance || "";
        topic.outcome = template.outcome || "";
      });

      var defaultState = {
        schemaVersion: 3,
        appVersion: APP_VERSION,
        updatedAt: null,
        questionResults: {},
        weakIds: [],
        daily: {},
        essays: {},
        totalEssayPractices: 0
      };

      var state = loadState();
      var ui = {
        view: "home",
        session: null,
        weakFilter: "all",
        essayTopicId: essayTopics[Math.floor(Math.random() * essayTopics.length)].id,
        csvVisible: false
      };
      var toastTimer = null;

      function cloneDefault() {
        return JSON.parse(JSON.stringify(defaultState));
      }

      function loadState() {
        try {
          var storage = window.localStorage;
          if (!storage) return cloneDefault();
          var raw = storage.getItem(STORAGE_KEY);
          if (!raw) return cloneDefault();
          var parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return cloneDefault();
          var merged = cloneDefault();
          Object.keys(merged).forEach(function (key) {
            if (typeof parsed[key] !== "undefined") merged[key] = parsed[key];
          });
          if (!merged.questionResults || typeof merged.questionResults !== "object") merged.questionResults = {};
          if (!Array.isArray(merged.weakIds)) merged.weakIds = [];
          merged.weakIds = unique(merged.weakIds || []);
          if (!merged.daily || typeof merged.daily !== "object") merged.daily = {};
          if (!merged.essays || typeof merged.essays !== "object") merged.essays = {};
          return merged;
        } catch (error) {
          return cloneDefault();
        }
      }

      function saveState(showMessage) {
        state.updatedAt = new Date().toISOString();
        state.appVersion = APP_VERSION;
        try {
          var storage = window.localStorage;
          if (!storage) throw new Error("localStorage unavailable");
          storage.setItem(STORAGE_KEY, JSON.stringify(state));
          if (showMessage) showToast("保存しました");
          return true;
        } catch (error) {
          showToast("保存できませんでした。ブラウザの設定をご確認ください");
          return false;
        }
      }

      function dateKey() {
        var now = new Date();
        return now.getFullYear() + "-" + pad(now.getMonth() + 1) + "-" + pad(now.getDate());
      }

      function pad(number) {
        number = String(number);
        return number.length < 2 ? "0" + number : number;
      }

      function getToday() {
        var key = dateKey();
        if (!state.daily[key]) {
          state.daily[key] = { answered: 0, essays: 0, bySubject: {} };
        }
        if (typeof state.daily[key].answered !== "number") state.daily[key].answered = 0;
        if (typeof state.daily[key].essays !== "number") state.daily[key].essays = 0;
        if (!state.daily[key].bySubject || typeof state.daily[key].bySubject !== "object") state.daily[key].bySubject = {};
        return state.daily[key];
      }

      function subjectById(id) {
        for (var i = 0; i < subjects.length; i += 1) {
          if (subjects[i].id === id) return subjects[i];
        }
        return subjects[0];
      }

      function questionById(id) {
        for (var i = 0; i < questions.length; i += 1) {
          if (questions[i].id === id) return questions[i];
        }
        return null;
      }

      function topicById(id) {
        for (var i = 0; i < essayTopics.length; i += 1) {
          if (essayTopics[i].id === id) return essayTopics[i];
        }
        return essayTopics[0];
      }

      function shuffle(list) {
        var result = list.slice();
        for (var i = result.length - 1; i > 0; i -= 1) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = result[i];
          result[i] = result[j];
          result[j] = temp;
        }
        return result;
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function unique(list) {
        return list.filter(function (item, index) {
          return list.indexOf(item) === index;
        });
      }

      function objectValues(object) {
        var values = [];
        if (!object) return values;
        Object.keys(object).forEach(function (key) {
          values.push(object[key]);
        });
        return values;
      }

      function elementMatches(element, selector) {
        if (!element) return false;
        var matcher = element.matches || element.webkitMatchesSelector || element.msMatchesSelector;
        return matcher ? matcher.call(element, selector) : false;
      }

      function isCorrectStatus(status) {
        return status === "correct" || status === "got";
      }

      function isWeakStatus(status) {
        return status === "incorrect" || status === "review" || status === "missed" || status === "unsure";
      }

      function statusClass(status) {
        if (status === "got") return "correct";
        if (status === "missed") return "incorrect";
        if (status === "unsure") return "review";
        return status || "";
      }

      function statusLabel(status) {
        if (status === "correct" || status === "got") return "正解";
        if (status === "incorrect" || status === "missed") return "不正解";
        if (status === "review" || status === "unsure") return "あとで復習";
        return "";
      }

      function showToast(message) {
        var toast = document.getElementById("toast");
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add("is-visible");
        window.clearTimeout(toastTimer);
        toastTimer = window.setTimeout(function () {
          toast.classList.remove("is-visible");
        }, 2200);
      }

      function updateHeader() {
        var today = getToday();
        var headerToday = document.getElementById("header-today");
        var headerHome = document.getElementById("header-home");
        if (headerToday) headerToday.textContent = "今日 " + today.answered + "問";
        if (headerHome && headerHome.classList) {
          if (ui.view !== "home") headerHome.classList.add("is-visible");
          else headerHome.classList.remove("is-visible");
        }
        var navView = ui.view === "quiz" ? "subjects" : ui.view;
        var navItems = document.querySelectorAll("[data-nav]");
        for (var i = 0; i < navItems.length; i += 1) {
          var item = navItems[i];
          var active = item.getAttribute("data-nav") === navView;
          if (item.classList) {
            if (active) item.classList.add("is-active");
            else item.classList.remove("is-active");
          }
          if (active) item.setAttribute("aria-current", "page");
          else item.removeAttribute("aria-current");
        }
      }

      function progressForSubject(subjectId) {
        var list = questions.filter(function (question) { return question.subject === subjectId; });
        var answered = list.filter(function (question) { return Boolean(state.questionResults[question.id]); }).length;
        var correct = list.filter(function (question) {
          return state.questionResults[question.id] && isCorrectStatus(state.questionResults[question.id].status);
        }).length;
        return { total: list.length, answered: answered, correct: correct };
      }

      function render() {
        try {
          updateHeader();
          var main = document.getElementById("main");
          if (!main) throw new Error("main element missing");
          if (ui.view === "home") main.innerHTML = renderHome();
          else if (ui.view === "subjects") main.innerHTML = renderSubjects();
          else if (ui.view === "quiz") main.innerHTML = renderQuiz();
          else if (ui.view === "weak") main.innerHTML = renderWeak();
          else if (ui.view === "essay") main.innerHTML = renderEssay();
          else if (ui.view === "records") main.innerHTML = renderRecords();
          else main.innerHTML = renderHome();
          window.__teacherOSAppReady = true;
          window.__teacherOSFallbackActive = false;
          setDebugStatus("読み込みOK: " + ui.view);
          try {
            window.scrollTo({ top: 0, behavior: "smooth" });
          } catch (scrollError) {
            window.scrollTo(0, 0);
          }
        } catch (error) {
          window.__teacherOSAppReady = false;
          renderSafeFallback(ui && ui.view ? ui.view : "home", "描画エラーを検知したため、安全表示に切り替えました。");
        }
      }

      function renderHome() {
        var today = getToday();
        var weakCount = weakQuestionIds().length;
        var goal = 20;
        var percent = Math.min(100, Math.round(today.answered / goal * 100));
        var drafted = Object.keys(state.essays).filter(function (id) {
          return hasEssaySelection(state.essays[id]);
        }).length;

        return [
          '<section class="hero" aria-labelledby="home-title">',
            '<div>',
              '<p class="eyebrow">Last-minute study</p>',
              '<h1 id="home-title">あと少しを、<span>確かな力</span>に。</h1>',
              '<p class="hero-lead">小学校全科の要点確認と、東京都の教員採用試験を意識した論文構成練習。短い時間でも迷わず、今日やるべき学習を進められます。</p>',
              (isAppleMobile && !isStandaloneMode ? '<p class="install-hint"><span>＋</span> Safariの共有メニューから「ホーム画面に追加」すると、アプリのように使えます。</p>' : ''),
            '</div>',
            '<div class="hero-meter" aria-label="今日の学習目標の進捗">',
              '<div class="hero-meter-label">今日の演習</div>',
              '<div class="hero-meter-value">' + today.answered + '<small>/ ' + goal + '問</small></div>',
              '<div class="meter-track"><span style="width:' + percent + '%"></span></div>',
              '<p class="meter-note">' + (today.answered >= goal ? '今日の目標を達成しました。積み重ねが力になります。' : 'まずは5問。タップで即確認しましょう。') + '</p>',
            '</div>',
          '</section>',
          '<div class="section-heading">',
            '<div><h2>学習メニュー</h2><p>取り組みたいモードを選んでください</p></div>',
          '</div>',
          '<section class="mode-grid" aria-label="学習メニュー">',
            modeCard("subjects", "all", "全", "小学校全科モード", "13教科・全65問。大きな選択肢をタップして、すぐ正誤と解説を確認します。", questions.length + "問収録"),
            modeCard("weak", "weak", "弱", "苦手問題モード", "不正解と「あとで復習」にした問題を優先して、短時間で回します。", weakCount + "問を復習"),
            modeCard("essay", "essay", "論", "論文練習モード", "テーマ、キーワード、実践例を選ぶだけで、論文構成メモを作ります。", drafted + "テーマ保存"),
            modeCard("records", "records", "録", "学習記録", "今日の演習量、教科別の習得状況、苦手問題と論文練習の回数を確認します。", "論文 " + (state.totalEssayPractices || 0) + "回"),
          '</section>'
        ].join("");
      }

      function modeCard(action, className, symbol, title, description, meta) {
        return [
          '<button class="mode-card ' + className + '" type="button" data-action="' + action + '">',
            '<span class="mode-icon">' + symbol + '</span>',
            '<span><span class="mode-title">' + title + '</span><span class="mode-description">' + description + '</span></span>',
            '<span class="chevron" aria-hidden="true">›</span>',
            '<span class="mode-meta">' + meta + '</span>',
          '</button>'
        ].join("");
      }

      function pageHead(title, description, backAction) {
        return [
          '<div class="page-head">',
            '<button class="back-button" type="button" data-action="' + backAction + '" aria-label="前の画面に戻る">←</button>',
            '<div><h1>' + title + '</h1><p>' + description + '</p></div>',
          '</div>'
        ].join("");
      }

      function renderSubjects() {
        var cards = subjects.map(function (subject) {
          var progress = progressForSubject(subject.id);
          var percent = Math.round(progress.answered / progress.total * 100);
          return [
            '<button class="subject-card" type="button" data-action="start-subject" data-subject="' + subject.id + '">',
              '<span class="subject-top">',
                '<span class="subject-symbol">' + subject.symbol + '</span>',
                '<span class="subject-count">' + progress.answered + ' / ' + progress.total + '問</span>',
              '</span>',
              '<span class="subject-name">' + subject.name + '</span>',
              '<span class="thin-track" aria-label="' + subject.name + 'の回答進捗 ' + percent + '%"><span style="width:' + percent + '%"></span></span>',
            '</button>'
          ].join("");
        }).join("");
        return pageHead("小学校全科モード", "教科別は5問ずつ。ランダムは全教科から10問を出題します。", "home") +
          '<div class="subject-actions">' +
            '<button class="btn btn-primary" type="button" data-action="start-random">全教科ランダム10問</button>' +
            '<button class="btn btn-secondary" type="button" data-action="records">CSV出力を見る</button>' +
          '</div>' +
          '<section class="subject-grid" aria-label="教科一覧">' + cards + '</section>';
      }

      function startSession(mode, questionList, subjectId, limit) {
        var ids = questionList.map(function (question) { return question.id; });
        ids = mode === "weak" ? ids.slice() : shuffle(ids);
        if (limit && ids.length > limit) ids = ids.slice(0, limit);
        var choiceOrders = {};
        ids.forEach(function (id) {
          var question = questionById(id);
          if (question) {
            choiceOrders[id] = shuffle(question.choices.map(function (_, index) { return index; }));
          }
        });
        ui.session = {
          mode: mode,
          subject: subjectId || "all",
          queue: ids,
          index: 0,
          selectedChoice: null,
          result: null,
          choiceOrders: choiceOrders
        };
      }

      function renderQuiz() {
        var session = ui.session;
        if (!session || session.index >= session.queue.length) return renderCompletion();
        var question = questionById(session.queue[session.index]);
        if (!question) return renderCompletion();
        return pageHead(subjectById(question.subject).name, "選択肢をタップすると、すぐ正誤と解説を表示します。", "subjects") +
          '<div class="quiz-layout">' + renderQuestionCard(question, session.index + 1, session.queue.length, false) + '</div>';
      }

      function weakQuestionIds() {
        var ids = state.weakIds.slice();
        Object.keys(state.questionResults || {}).forEach(function (id) {
          var result = state.questionResults[id];
          if (result && (isWeakStatus(result.status) || result.review)) ids.push(id);
        });
        return unique(ids).filter(function (id) { return Boolean(questionById(id)); });
      }

      function weakPriority(question) {
        var result = state.questionResults[question.id];
        var status = result && result.status;
        if (status === "incorrect" || status === "missed") return 0;
        if (status === "review" || status === "unsure" || (result && result.review)) return 1;
        return 2;
      }

      function renderWeak() {
        var options = '<option value="all">すべての教科</option>' + subjects.map(function (subject) {
          var count = weakQuestionIds().filter(function (id) {
            var question = questionById(id);
            return question && question.subject === subject.id;
          }).length;
          return '<option value="' + subject.id + '"' + (ui.weakFilter === subject.id ? ' selected' : '') + '>' + subject.name + '（' + count + '）</option>';
        }).join("");

        var filter = [
          '<div class="filter-bar">',
            '<label for="weak-filter">出題する教科</label>',
            '<select id="weak-filter" data-action="weak-filter">' + options + '</select>',
          '</div>'
        ].join("");

        var available = weakQuestionIds().map(questionById).filter(Boolean).filter(function (question) {
          return ui.weakFilter === "all" || question.subject === ui.weakFilter;
        }).sort(function (a, b) {
          return weakPriority(a) - weakPriority(b);
        });

        var answeredQuestion = null;
        if (ui.session && ui.session.mode === "weak" && ui.session.result) {
          answeredQuestion = questionById(ui.session.queue[ui.session.index]);
        }

        if (!available.length && !answeredQuestion) {
          return pageHead("苦手問題モード", "不正解と「あとで復習」にした問題を集中して復習します。", "home") +
            filter +
            '<section class="empty-state"><div class="empty-icon">✓</div><h2>復習する問題はありません</h2><p>' +
            (ui.weakFilter === "all" ? '苦手問題が登録されると、ここに表示されます。全科モードから問題に取り組んでみましょう。' : 'この教科の苦手問題はありません。別の教科を選ぶか、全科モードに挑戦しましょう。') +
            '</p><button class="btn btn-blue" type="button" data-action="subjects">全科モードへ</button></section>';
        }

        if (!ui.session || ui.session.mode !== "weak" || ui.session.subject !== ui.weakFilter) {
          startSession("weak", available, ui.weakFilter);
        }
        if (!ui.session.result) {
          var validIds = available.map(function (question) { return question.id; });
          ui.session.queue = ui.session.queue.filter(function (id) { return validIds.indexOf(id) !== -1; });
          validIds.forEach(function (id) {
            if (ui.session.queue.indexOf(id) === -1) ui.session.queue.push(id);
            if (!ui.session.choiceOrders[id]) {
              var item = questionById(id);
              if (item) ui.session.choiceOrders[id] = shuffle(item.choices.map(function (_, index) { return index; }));
            }
          });
          if (ui.session.index >= ui.session.queue.length) ui.session.index = 0;
        }

        var current = questionById(ui.session.queue[ui.session.index]);
        if (!current) return renderCompletion();
        return pageHead("苦手問題モード", "正解すると復習リストから外れます。迷う問題はもう一度「あとで復習」にできます。", "home") +
          filter +
          '<div class="quiz-layout">' + renderQuestionCard(current, ui.session.index + 1, ui.session.queue.length, true) + '</div>';
      }

      function renderQuestionCard(question, position, total, weakMode) {
        var session = ui.session;
        var previous = state.questionResults[question.id];
        var previousLabel = previous ? statusLabel(previous.status) : "";
        if (previous && state.weakIds.indexOf(question.id) !== -1 && isCorrectStatus(previous.status)) previousLabel += "・復習";
        var previousBadge = previous ? '<span class="status-badge ' + statusClass(previous.status) + '">前回：' + previousLabel + '</span>' : '<span class="status-badge">初回</span>';
        var order = session.choiceOrders && session.choiceOrders[question.id];
        if (!order) {
          order = shuffle(question.choices.map(function (_, index) { return index; }));
          if (!session.choiceOrders) session.choiceOrders = {};
          session.choiceOrders[question.id] = order;
        }
        var answered = session.selectedChoice !== null && typeof session.selectedChoice !== "undefined";
        var choices = '<div class="choice-list" role="list">' + order.map(function (choiceIndex, displayIndex) {
          var isCorrect = choiceIndex === question.correctIndex;
          var isSelected = choiceIndex === session.selectedChoice;
          var classes = ["choice-button"];
          if (answered && isCorrect) classes.push("is-correct");
          if (answered && isSelected && !isCorrect) classes.push("is-wrong");
          if (!answered && isSelected) classes.push("is-selected");
          return [
            '<button class="' + classes.join(" ") + '" type="button" data-action="choose-answer" data-choice="' + choiceIndex + '"' + (answered ? ' disabled' : '') + '>',
              '<span class="choice-marker">' + String.fromCharCode(65 + displayIndex) + '</span>',
              '<span>' + escapeHtml(question.choices[choiceIndex]) + '</span>',
            '</button>'
          ].join("");
        }).join("") + '</div>';

        var feedback = "";
        if (answered) {
          var correct = session.result === "correct";
          feedback = [
            '<div class="feedback-panel ' + (correct ? 'is-correct' : 'is-incorrect') + '" id="answer-panel">',
              '<p class="feedback-title">' + (correct ? '✓ 正解です' : '✕ 不正解です') + '</p>',
              '<p class="feedback-answer">正解：' + escapeHtml(question.answer) + '</p>',
              '<p class="explanation"><strong>ポイント：</strong>' + escapeHtml(question.explanation) + '</p>',
            '</div>'
          ].join("");
        }

        var actions;
        if (!answered) {
          actions = '<p class="grading-hint">選択肢をタップしてください。解答は自動で記録されます。</p>';
        } else {
          var inReview = state.weakIds.indexOf(question.id) !== -1;
          var resultMessage = session.result === "correct"
            ? (inReview ? "正解です。必要なら復習対象に残せます。" : "正解として記録しました。")
            : "不正解として記録し、苦手問題に保存しました。";
          actions = '<div class="result-banner">' + resultMessage + '</div>' +
            '<button class="btn btn-secondary" type="button" data-action="mark-review">' + (inReview ? "復習対象に保存済み" : "あとで復習") + '</button>' +
            '<button class="btn btn-blue" type="button" data-action="next-question">' +
            (session.index + 1 >= session.queue.length ? "結果を見る" : "次の問題") + '</button>';
        }

        var percent = Math.round(position / total * 100);
        return [
          '<div class="quiz-status"><span>' + position + ' / ' + total + ' 問</span><span>' + percent + '%</span></div>',
          '<div class="thin-track" style="margin-bottom:16px"><span style="width:' + percent + '%"></span></div>',
          '<article class="quiz-card">',
            '<div class="quiz-card-head"><span class="subject-badge">' + subjectById(question.subject).name + '</span>' + previousBadge + '</div>',
            '<div class="question-area">',
              '<div class="question-label">QUESTION</div>',
              '<p class="question-text">' + escapeHtml(question.question) + '</p>',
              choices,
              feedback,
            '</div>',
            '<div class="quiz-actions">' + actions + '</div>',
          '</article>'
        ].join("");
      }

      function renderCompletion() {
        var session = ui.session;
        var total = session ? session.queue.length : 0;
        var nextAction = session && session.mode === "weak" ? "weak" : "subjects";
        return pageHead("演習完了", "おつかれさまでした。記録は自動で保存されています。", "home") +
          '<section class="completion-card"><div class="empty-icon">✓</div><h2>' + total + '問、確認できました</h2><p>不正解と「あとで復習」にした問題は苦手問題モードに保存されています。時間を空けてもう一度タップ練習しましょう。</p><button class="btn btn-blue" type="button" data-action="' + nextAction + '">続けて学習する</button></section>';
      }

      function recordAnswer(question, isCorrect, selectedChoice) {
        var previous = state.questionResults[question.id] || { attempts: 0, correctCount: 0, gotCount: 0 };
        var status = isCorrect ? "correct" : "incorrect";
        state.questionResults[question.id] = {
          status: status,
          attempts: (previous.attempts || 0) + 1,
          correctCount: (previous.correctCount || previous.gotCount || 0) + (isCorrect ? 1 : 0),
          gotCount: (previous.gotCount || 0) + (isCorrect ? 1 : 0),
          selectedChoice: selectedChoice,
          review: false,
          lastAnsweredAt: new Date().toISOString()
        };

        var weakIndex = state.weakIds.indexOf(question.id);
        if (isCorrect && weakIndex !== -1) state.weakIds.splice(weakIndex, 1);
        if (!isCorrect && weakIndex === -1) state.weakIds.push(question.id);

        var today = getToday();
        today.answered += 1;
        if (!today.bySubject[question.subject]) {
          today.bySubject[question.subject] = { answered: 0, correct: 0, incorrect: 0, got: 0, missed: 0 };
        }
        today.bySubject[question.subject].answered += 1;
        today.bySubject[question.subject][isCorrect ? "correct" : "incorrect"] = (today.bySubject[question.subject][isCorrect ? "correct" : "incorrect"] || 0) + 1;
        today.bySubject[question.subject][isCorrect ? "got" : "missed"] = (today.bySubject[question.subject][isCorrect ? "got" : "missed"] || 0) + 1;
        state.weakIds = unique(state.weakIds);
        saveState(false);
      }

      function markForReview(question) {
        var previous = state.questionResults[question.id] || { attempts: 0, correctCount: 0 };
        state.questionResults[question.id] = {
          status: previous.status || "review",
          attempts: previous.attempts || 0,
          correctCount: previous.correctCount || previous.gotCount || 0,
          gotCount: previous.gotCount || 0,
          selectedChoice: previous.selectedChoice,
          lastAnsweredAt: previous.lastAnsweredAt || null,
          review: true,
          markedForReviewAt: new Date().toISOString()
        };
        if (state.weakIds.indexOf(question.id) === -1) state.weakIds.push(question.id);
        state.weakIds = unique(state.weakIds);
        saveState(false);
      }

      function ensureEssayDraft(topicId) {
        if (!state.essays[topicId]) {
          state.essays[topicId] = {
            selections: { keywords: [], practices: [] },
            updatedAt: null,
            practiceCount: 0,
            lastPracticedAt: null
          };
        }
        var draft = state.essays[topicId];
        if (!draft.selections) draft.selections = { keywords: [], practices: [] };
        if (!Array.isArray(draft.selections.keywords)) draft.selections.keywords = [];
        if (!Array.isArray(draft.selections.practices)) draft.selections.practices = [];
        return draft;
      }

      function hasEssaySelection(draft) {
        if (!draft) return false;
        if (draft.selections) {
          return Boolean((draft.selections.keywords && draft.selections.keywords.length) || (draft.selections.practices && draft.selections.practices.length));
        }
        if (draft.fields) {
          return objectValues(draft.fields).some(function (value) { return String(value || "").trim(); });
        }
        return false;
      }

      function renderEssay() {
        var topic = topicById(ui.essayTopicId);
        var draft = ensureEssayDraft(topic.id);
        var topicOptions = essayTopics.map(function (item) {
          return '<option value="' + item.id + '"' + (item.id === topic.id ? ' selected' : '') + '>' + escapeHtml(item.title) + '</option>';
        }).join("");
        var memo = buildEssayMemo(topic, draft);

        return pageHead("論文練習モード", "テーマ・キーワード・実践例をタップして、論文構成を短時間で確認します。", "home") +
          '<div class="essay-layout">' +
            '<section class="essay-main">' +
              '<div class="essay-topic">' +
                '<div class="essay-topic-top"><span class="subject-badge">今回のテーマ</span><button class="text-button" type="button" data-action="random-topic">別のテーマを出す</button></div>' +
                '<h2>' + escapeHtml(topic.title) + '</h2><p>' + escapeHtml(topic.hint) + '</p>' +
                '<select class="topic-select" data-action="essay-topic-select" aria-label="論文テーマを選ぶ">' + topicOptions + '</select>' +
              '</div>' +
              '<div class="essay-fields">' +
                essayOptionGroup("keywords", "1. 使うキーワードを選ぶ", "答案に入れたい教育用語を2〜3個選ぶと、論点がぶれにくくなります。", topic.keywords, draft.selections.keywords) +
                essayOptionGroup("practices", "2. 具体的な実践例を選ぶ", "本番で書きやすい実践を1〜2個選びます。選んだ内容が下のメモに入ります。", topic.practices, draft.selections.practices) +
                '<div class="memo-card" aria-label="自動生成された論文構成メモ">' +
                  '<h3>3. 自動で組み上がる構成メモ</h3>' +
                  '<ol class="memo-list">' + memo.map(function (item, index) {
                    return '<li><span class="memo-num">' + (index + 1) + '</span><span><strong>' + escapeHtml(item.title) + '</strong><br>' + escapeHtml(item.body) + '</span></li>';
                  }).join("") + '</ol>' +
                '</div>' +
                '<div class="essay-footer"><span class="save-status" id="save-status">● タップで自動保存</span><button class="btn btn-primary" type="button" data-action="record-essay">この構成メモを記録</button></div>' +
              '</div>' +
            '</section>' +
            '<aside class="essay-guide" aria-label="論文の型">' +
              '<div class="guide-head"><p>WRITING FRAME</p><h2>論文の型</h2></div>' +
              '<ol class="guide-steps">' +
                '<li><span class="step-num">1</span><span>教育課題を明確にする</span></li>' +
                '<li><span class="step-num">2</span><span>教師としての基本姿勢を書く</span></li>' +
                '<li><span class="step-num">3</span><span>具体的な実践を2つ書く</span></li>' +
                '<li><span class="step-num">4</span><span>児童の成長につなげてまとめる</span></li>' +
              '</ol>' +
            '</aside>' +
          '</div>';
      }

      function essayOptionGroup(kind, title, description, options, selected) {
        return [
          '<div class="template-section">',
            '<h3>' + escapeHtml(title) + '</h3>',
            '<p>' + escapeHtml(description) + '</p>',
            '<div class="option-chips">' + options.map(function (value) {
              var active = selected.indexOf(value) !== -1;
              return '<button class="essay-chip' + (active ? ' is-selected' : '') + '" type="button" data-action="essay-toggle" data-kind="' + kind + '" data-value="' + escapeHtml(value) + '">' + (active ? '✓ ' : '') + escapeHtml(value) + '</button>';
            }).join("") + '</div>',
          '</div>'
        ].join("");
      }

      function buildEssayMemo(topic, draft) {
        var keywords = draft.selections.keywords.length ? draft.selections.keywords.join("、") : "選択したキーワード";
        var practices = draft.selections.practices.length ? draft.selections.practices : ["実践例を1つ選択", "必要に応じてもう1つ選択"];
        var firstPractice = practices[0];
        var secondPractice = practices[1] || "もう1つの実践例を選択して具体化する";
        return [
          {
            title: "課題・背景",
            body: topic.title + "は、" + keywords + "の視点から、全ての児童の学びと安心を保障するために重要な教育課題である。"
          },
          {
            title: "教師としての方針",
            body: topic.stance || "児童理解を基盤に、組織的・継続的に指導を進める。"
          },
          {
            title: "具体的な実践",
            body: "第一に、" + firstPractice + "。第二に、" + secondPractice + "。"
          },
          {
            title: "まとめ",
            body: topic.outcome || "児童一人一人の成長につながるよう、実践を振り返りながら改善を続ける。"
          }
        ];
      }

      function toggleEssaySelection(kind, value) {
        var draft = ensureEssayDraft(ui.essayTopicId);
        var list = draft.selections[kind];
        var index = list.indexOf(value);
        if (index === -1) list.push(value);
        else list.splice(index, 1);
        draft.updatedAt = new Date().toISOString();
        saveState(false);
      }

      function csvEscape(value) {
        value = String(value || "");
        if (value.search(/[",\n\r]/) !== -1) return '"' + value.replace(/"/g, '""') + '"';
        return value;
      }

      function csvChoiceIndexes(question, questionIndex) {
        var indexes = [0, 1, 2, 3];
        var shift = questionIndex % indexes.length;
        return indexes.slice(shift).concat(indexes.slice(0, shift)).filter(function (index) {
          return index < question.choices.length;
        });
      }

      function answerLetterFor(indexes, correctIndex) {
        var letters = ["A", "B", "C", "D"];
        for (var i = 0; i < indexes.length; i += 1) {
          if (indexes[i] === correctIndex) return letters[i];
        }
        return "A";
      }

      function buildQuestionsCsv() {
        var rows = [["教科", "問題", "選択肢A", "選択肢B", "選択肢C", "選択肢D", "正解", "解説"].map(csvEscape).join(",")];
        questions.forEach(function (question, index) {
          var indexes = csvChoiceIndexes(question, index);
          var row = [
            subjectById(question.subject).name,
            question.question,
            question.choices[indexes[0]] || "",
            question.choices[indexes[1]] || "",
            question.choices[indexes[2]] || "",
            question.choices[indexes[3]] || "",
            answerLetterFor(indexes, question.correctIndex),
            question.explanation
          ];
          rows.push(row.map(csvEscape).join(","));
        });
        return rows.join("\n");
      }

      function showCsvPanel(message) {
        ui.csvVisible = true;
        ui.view = "records";
        render();
        showToast(message || "CSVを表示しました");
      }

      function copyQuestionsCsv() {
        var csv = buildQuestionsCsv();
        if (window.navigator && window.navigator.clipboard && window.navigator.clipboard.writeText) {
          window.navigator.clipboard.writeText(csv).then(function () {
            showToast("CSVをコピーしました");
          }).catch(function () {
            showCsvPanel("CSVを表示しました。長押しでコピーできます");
          });
        } else {
          showCsvPanel("CSVを表示しました。長押しでコピーできます");
        }
      }

      function downloadQuestionsCsv() {
        try {
          var csv = "\ufeff" + buildQuestionsCsv();
          var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
          var url = window.URL.createObjectURL(blob);
          var link = document.createElement("a");
          link.href = url;
          link.download = "teacheros_exam_cram_questions.csv";
          document.body.appendChild(link);
          link.click();
          window.setTimeout(function () {
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
          }, 0);
          showToast("CSVをダウンロードします");
        } catch (error) {
          showCsvPanel("CSVを表示しました。コピーして保存してください");
        }
      }

      function renderRecords() {
        var today = getToday();
        var todayCorrect = objectValues(today.bySubject).reduce(function (sum, item) { return sum + (item.correct || item.got || 0); }, 0);
        var todayRate = today.answered ? Math.round(todayCorrect / today.answered * 100) : 0;
        var rows = subjects.map(function (subject) {
          var progress = progressForSubject(subject.id);
          var rate = progress.answered ? Math.round(progress.correct / progress.answered * 100) : 0;
          return [
            '<div class="record-row">',
              '<div class="record-subject">' + subject.name + '</div>',
              '<div class="record-track" aria-label="' + subject.name + 'の正解率 ' + rate + '%"><span style="width:' + rate + '%"></span></div>',
              '<div class="record-numbers"><strong>' + progress.correct + '問正解</strong> / ' + progress.answered + '問回答</div>',
            '</div>'
          ].join("");
        }).join("");
        var csvPanelClass = ui.csvVisible ? "csv-panel is-visible" : "csv-panel";
        var csvText = ui.csvVisible ? escapeHtml(buildQuestionsCsv()) : "";

        return pageHead("学習記録", "積み重ねと現在地を確認し、次に取り組む内容を決めましょう。", "home") +
          '<section class="stats-grid" aria-label="学習状況の概要">' +
            statCard("問", today.answered, "問", "今日解いた問題") +
            statCard("率", todayRate, "%", "今日の正解率") +
            statCard("弱", weakQuestionIds().length, "問", "苦手・復習") +
            statCard("論", state.totalEssayPractices || 0, "回", "論文練習") +
          '</section>' +
          '<section class="record-card">' +
            '<div class="record-card-head"><div><h2>教科別の正答状況</h2><p>各問題の最新の正解・不正解を集計しています</p></div><span class="subject-badge">全' + questions.length + '問</span></div>' +
            '<div class="record-list">' + rows + '</div>' +
            '<p class="record-note">「正解率」は、一度でも回答した問題のうち、最新の記録が正解の割合です。「あとで復習」にしても、直近の正誤記録は保持されます。</p>' +
          '</section>' +
          '<section class="record-card" aria-label="CSV出力">' +
            '<div class="record-card-head"><div><h2>問題CSV出力</h2><p>教科,問題,選択肢A,選択肢B,選択肢C,選択肢D,正解,解説 の形式で出力します</p></div><span class="subject-badge">CSV</span></div>' +
            '<div class="csv-actions">' +
              '<button class="btn btn-primary" type="button" data-action="download-csv">CSVをダウンロード</button>' +
              '<button class="btn btn-secondary" type="button" data-action="copy-csv">CSVをコピー</button>' +
              '<button class="btn btn-blue btn-wide" type="button" data-action="show-csv">' + (ui.csvVisible ? "CSV表示を閉じる" : "CSVを画面に表示") + '</button>' +
            '</div>' +
            '<div class="' + csvPanelClass + '">' +
              '<label for="csv-output">CSVプレビュー</label>' +
              '<textarea id="csv-output" readonly>' + csvText + '</textarea>' +
            '</div>' +
          '</section>';
      }

      function statCard(symbol, value, unit, label) {
        return '<div class="stat-card"><div class="stat-icon">' + symbol + '</div><div class="stat-value">' + value + '<small>' + unit + '</small></div><div class="stat-label">' + label + '</div></div>';
      }

      function go(view) {
        ui.view = view;
        if (view !== "quiz" && view !== "weak") ui.session = null;
        render();
        var main = document.getElementById("main");
        if (main && main.focus) {
          try {
            main.focus({ preventScroll: true });
          } catch (error) {
            main.focus();
          }
        }
      }

      document.addEventListener("click", function (event) {
        var button = findActionElement(event.target);
        if (!button) return;
        var action = button.getAttribute("data-action");

        if (action === "home") go("home");
        else if (action === "subjects") go("subjects");
        else if (action === "weak") {
          ui.view = "weak";
          ui.session = null;
          render();
          var weakMain = document.getElementById("main");
          if (weakMain && weakMain.focus) {
            try {
              weakMain.focus({ preventScroll: true });
            } catch (error) {
              weakMain.focus();
            }
          }
        }
        else if (action === "essay") go("essay");
        else if (action === "records") go("records");
        else if (action === "show-csv") {
          ui.csvVisible = !ui.csvVisible;
          ui.view = "records";
          render();
        }
        else if (action === "copy-csv") {
          copyQuestionsCsv();
        }
        else if (action === "download-csv") {
          downloadQuestionsCsv();
        }
        else if (action === "start-subject") {
          var subjectId = button.getAttribute("data-subject");
          startSession("all", questions.filter(function (question) { return question.subject === subjectId; }), subjectId);
          ui.view = "quiz";
          render();
        }
        else if (action === "start-random") {
          startSession("random", questions, "all", 10);
          ui.view = "quiz";
          render();
        }
        else if (action === "choose-answer" && ui.session && ui.session.selectedChoice === null) {
          var question = questionById(ui.session.queue[ui.session.index]);
          var choiceIndex = Number(button.getAttribute("data-choice"));
          if (question && !isNaN(choiceIndex)) {
            var correct = choiceIndex === question.correctIndex;
            recordAnswer(question, correct, choiceIndex);
            ui.session.selectedChoice = choiceIndex;
            ui.session.result = correct ? "correct" : "incorrect";
            render();
            var answerPanel = document.getElementById("answer-panel");
            if (answerPanel && answerPanel.scrollIntoView) {
              try {
                answerPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
              } catch (error) {
                answerPanel.scrollIntoView();
              }
            }
          }
        }
        else if (action === "mark-review" && ui.session) {
          var reviewQuestion = questionById(ui.session.queue[ui.session.index]);
          if (reviewQuestion) {
            markForReview(reviewQuestion);
            render();
            showToast("あとで復習に保存しました");
          }
        }
        else if (action === "next-question" && ui.session) {
          ui.session.index += 1;
          ui.session.selectedChoice = null;
          ui.session.result = null;
          render();
        }
        else if (action === "random-topic") {
          var otherTopics = essayTopics.filter(function (topic) { return topic.id !== ui.essayTopicId; });
          ui.essayTopicId = otherTopics[Math.floor(Math.random() * otherTopics.length)].id;
          render();
        }
        else if (action === "record-essay") {
          var draft = ensureEssayDraft(ui.essayTopicId);
          if (!hasEssaySelection(draft)) {
            showToast("キーワードか実践例を1つ選びましょう");
            return;
          }
          draft.practiceCount = (draft.practiceCount || 0) + 1;
          draft.lastPracticedAt = new Date().toISOString();
          state.totalEssayPractices = (state.totalEssayPractices || 0) + 1;
          getToday().essays += 1;
          saveState(false);
          updateHeader();
          showToast("論文練習を1回として記録しました");
        }
        else if (action === "essay-toggle") {
          var kind = button.getAttribute("data-kind");
          var value = button.getAttribute("data-value");
          if ((kind === "keywords" || kind === "practices") && value) {
            toggleEssaySelection(kind, value);
            render();
          }
        }
      });

      document.addEventListener("change", function (event) {
        if (!event.target || !event.target.getAttribute) return;
        var action = event.target.getAttribute("data-action");
        if (action === "weak-filter") {
          ui.weakFilter = event.target.value;
          ui.session = null;
          render();
        }
        if (action === "essay-topic-select" && event.target.value) {
          ui.essayTopicId = event.target.value;
          render();
        }
      });

      window.addEventListener("pagehide", function () {
        saveState(false);
      });

      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") saveState(false);
      });

      document.addEventListener("focusin", function (event) {
        if (elementMatches(event.target, "textarea, select") && document.body.classList) document.body.classList.add("keyboard-active");
      });

      document.addEventListener("focusout", function (event) {
        if (!elementMatches(event.target, "textarea, select")) return;
        window.setTimeout(function () {
          if ((!document.activeElement || !elementMatches(document.activeElement, "textarea, select")) && document.body.classList) {
            document.body.classList.remove("keyboard-active");
          }
        }, 80);
      });

      function bootApp() {
        try {
          render();
        } catch (error) {
          window.__teacherOSAppReady = false;
          renderSafeFallback("home", "起動エラーを検知したため、安全表示で起動しました。");
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", bootApp, false);
      } else {
        bootApp();
      }
    }());
  </script>
</body>
</html>
